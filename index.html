<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Twibbon Frame Maker</title>
<script>
(function(){
  var p = new URLSearchParams(location.search);
  if (p.get('campaign')) { location.replace('./user.html' + location.search); return; }
  if (p.get('admin') === '1') { location.replace('./admin.html'); return; }
})();
</script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f2f1ed;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#fff;border:1px solid #e2dfd7;border-radius:14px;padding:40px 32px;text-align:center;max-width:360px;width:100%}
.logo{font-size:38px;margin-bottom:14px}
h1{font-size:22px;font-weight:700;margin-bottom:6px;color:#17160f}
.sub{font-size:13px;color:#69665c;margin-bottom:28px;line-height:1.6}
.btn{display:block;width:100%;padding:13px;border-radius:10px;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;border:none;text-decoration:none;margin-bottom:10px;transition:all .15s;-webkit-tap-highlight-color:transparent}
.btn-blue{background:#2563eb;color:#fff}
.btn-blue:active{background:#1d4ed8}
.btn-ghost{background:#fff;color:#17160f;border:1px solid #cac7bf}
.btn-ghost:active{background:#f2f1ed}
.divider{font-size:12px;color:#69665c;margin:4px 0 12px}
</style>
</head>
<body>
<div class="card">
  <div class="logo">🎨</div>
  <h1>Twibbon</h1>
  <p class="sub">Add a campaign frame to your photo and show your support.</p>
  <a class="btn btn-blue" href="./user.html">Open Frame Maker</a>
  <div class="divider">— admin —</div>
  <a class="btn btn-ghost" href="./admin.html">Admin Panel</a>
</div>
</body>
</html>
