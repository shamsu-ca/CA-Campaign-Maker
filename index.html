<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Campaign Maker</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f5f4f0;
    --surface: #ffffff;
    --border: #e2e0d8;
    --text: #1a1916;
    --text-muted: #6b6960;
    --accent: #1d4ed8;
    --radius: 8px;
    --font: 'Segoe UI', system-ui, sans-serif;
  }
  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 40px;
    text-align: center;
    max-width: 400px;
    width: 90%;
  }
  .logo { font-size: 32px; margin-bottom: 12px; }
  h1 { font-size: 22px; font-weight: 600; margin-bottom: 6px; }
  .sub { font-size: 14px; color: var(--text-muted); margin-bottom: 32px; }
  .btn {
    display: block;
    width: 100%;
    padding: 12px;
    border-radius: var(--radius);
    font-size: 14px;
    font-weight: 600;
    font-family: var(--font);
    cursor: pointer;
    border: 1px solid transparent;
    text-decoration: none;
    margin-bottom: 10px;
    transition: all 0.15s;
  }
  .btn-primary { background: #1d4ed8; color: #fff; }
  .btn-primary:hover { background: #1e40af; }
  .btn-secondary { background: var(--surface); color: var(--text); border-color: #c8c6bc; }
  .btn-secondary:hover { background: var(--bg); }
  .divider { font-size: 11px; color: var(--text-muted); margin: 8px 0 16px; }
</style>
<script>
  // Auto-redirect if ?template=ID is in the URL
  (function() {
    const params = new URLSearchParams(window.location.search);
    if (params.get('template')) {
      window.location.replace('./user.html' + window.location.search);
    }
    if (params.get('admin') === '1') {
      window.location.replace('./admin.html');
    }
  })();
</script>
</head>
<body>
<div class="card">
  <div class="logo">🎨</div>
  <h1>Campaign Maker</h1>
  <p class="sub">Create and share campaign posters in seconds.</p>
  <a class="btn btn-primary" href="./user.html">Open as User</a>
  <div class="divider">— or —</div>
  <a class="btn btn-secondary" href="./admin.html">Admin Panel</a>
</div>
</body>
</html>
