<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Twibbon Frame Maker</title>
<script>
(function() {
  const p = new URLSearchParams(location.search);
  if (p.get('campaign')) { location.replace('./user.html' + location.search); return; }
  if (p.get('admin') === '1') { location.replace('./admin.html'); return; }
})();
</script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f4f3ef;min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{background:#fff;border:1px solid #e0ddd6;border-radius:14px;padding:44px 36px;text-align:center;max-width:380px;width:90%}
.logo{font-size:40px;margin-bottom:14px}
h1{font-size:24px;font-weight:700;margin-bottom:6px;color:#18170f}
.sub{font-size:14px;color:#6b695f;margin-bottom:32px;line-height:1.6}
.btn{display:block;width:100%;padding:13px;border-radius:10px;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;border:none;text-decoration:none;margin-bottom:10px;transition:all .15s}
.btn-primary{background:#2563eb;color:#fff}
.btn-primary:hover{background:#1d4ed8}
.btn-secondary{background:#fff;color:#18170f;border:1px solid #c9c6be}
.btn-secondary:hover{background:#f4f3ef}
.divider{font-size:12px;color:#6b695f;margin:4px 0 12px}
</style>
</head>
<body>
<div class="card">
  <div class="logo">🎨</div>
  <h1>Twibbon</h1>
  <p class="sub">Add a campaign frame to your photo and show your support.</p>
  <a class="btn btn-primary" href="./user.html">Open User Tool</a>
  <div class="divider">— or —</div>
  <a class="btn btn-secondary" href="./admin.html">Admin Panel</a>
</div>
</body>
</html>
